  { name: 'Anthony',                    phone: 'antlive71809@yahoo.com', category: 'Plumbing / HVAC', source: 'Cold text reply', status: 'replied', notes: 'plumbing/drain co — wants weekly specials. Form May 17. Follow-up Mon ~10am.' },

const LOCAL_CACHE_KEY = 'jsd-leads-cache';
const MS_PER_DAY = 1000 * 60 * 60 * 24;
let leads = [];
let editingId = null;
let confirmDeleteId = null;
let showAddForm = false;
let searchTerm = '';
let showOnlyStale = false;
let newLeadDraft = { name: '', phone: '', category: CATEGORIES[0], source: SOURCES[0], status: 'verified', notes: '' };
let saveTimeout = null;

function nowISO() { return new Date().toISOString(); }

function daysSince(iso) {
  if (!iso) return null;
  return Math.floor((Date.now() - new Date(iso).getTime()) / MS_PER_DAY);
}

function relativeTime(iso) {
  if (!iso) return '';
  const days = daysSince(iso);
  if (days === 0) return 'today';
  if (days === 1) return 'yesterday';
  if (days < 7) return days + 'd ago';
  if (days < 30) return Math.floor(days / 7) + 'w ago';
  return Math.floor(days / 30) + 'mo ago';
}

function isStale(lead) {
  const status = STATUSES.find(s => s.id === lead.status);
  if (!status || !status.stale) return false;
  const ref = lead.lastUpdated || lead.createdAt;
  const days = daysSince(ref);
  return days !== null && days >= FOLLOWUP_THRESHOLD_DAYS;
}

function setSyncStatus(state, text) {
  const el = document.getElementById('sync-status');
  el.className = 'sync-status ' + state;
  document.getElementById('sync-text').textContent = text;
}
function setLastSync() {
  document.getElementById('last-sync').textContent = 'last synced ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function isConfigured() {
  return JSONBIN_BIN_ID && JSONBIN_BIN_ID !== 'PASTE_YOUR_BIN_ID_HERE'
      && JSONBIN_ACCESS_KEY && JSONBIN_ACCESS_KEY !== 'PASTE_YOUR_ACCESS_KEY_HERE';
}

async function loadFromCloud() {
  if (!isConfigured()) return null;
  setSyncStatus('saving', 'loading from cloud...');
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
      headers: { 'X-Access-Key': JSONBIN_ACCESS_KEY }
    });
    if (!res.ok) throw new Error('cloud read failed: ' + res.status);
    const data = await res.json();
    const record = data.record;
    const list = Array.isArray(record) ? record : (Array.isArray(record?.leads) ? record.leads : []);
    setSyncStatus('saved', 'synced');
    setLastSync();
    return list;
  } catch (e) {
    console.error('Load failed:', e);
    setSyncStatus('error', 'cloud unreachable — using local cache');
    return null;
  }
}

async function saveToCloud(data) {
  if (!isConfigured()) return false;
  setSyncStatus('saving', 'saving...');
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Access-Key': JSONBIN_ACCESS_KEY },
      body: JSON.stringify(data),
    });
    if (!res.ok) throw new Error('cloud write failed: ' + res.status);
    setSyncStatus('saved', 'saved');
    setLastSync();
    return true;
  } catch (e) {
    console.error('Save failed:', e);
    setSyncStatus('error', 'save failed — keeping local copy');
    return false;
  }
}

function saveToLocal() {
  try { localStorage.setItem(LOCAL_CACHE_KEY, JSON.stringify(leads)); } catch (e) {}
}
function loadFromLocal() {
  try { return JSON.parse(localStorage.getItem(LOCAL_CACHE_KEY) || '[]'); }
  catch (e) { return []; }
}
function scheduleSave() {
  saveToLocal();
  if (saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => saveToCloud(leads), 500);
}
async function reloadFromCloud() {
  const cloud = await loadFromCloud();
  if (cloud !== null) { leads = cloud; saveToLocal(); render(); }
}

function addLead() {
  if (!newLeadDraft.name.trim()) return;
  const now = nowISO();
  leads.unshift({
    id: Date.now().toString() + Math.random().toString(36).slice(2, 8),
    name: newLeadDraft.name.trim(),
    phone: newLeadDraft.phone.trim(),
    category: newLeadDraft.category === CATEGORIES[0] ? '' : newLeadDraft.category,
    source: newLeadDraft.source === SOURCES[0] ? '' : newLeadDraft.source,
    status: newLeadDraft.status,
    notes: newLeadDraft.notes.trim(),
    createdAt: now,
    lastUpdated: now,
  });
  newLeadDraft = { name: '', phone: '', category: CATEGORIES[0], source: SOURCES[0], status: 'verified', notes: '' };
  showAddForm = false;
  scheduleSave();
  render();
}

function updateLead(id, changes) {
  leads = leads.map(l => l.id === id ? { ...l, ...changes, lastUpdated: nowISO() } : l);
  scheduleSave();
  render();
}

// Mark contact as "touched" — updates timestamp without changing data (resets stale flag)
function touchLead(id) {
  leads = leads.map(l => l.id === id ? { ...l, lastUpdated: nowISO() } : l);
  scheduleSave();
  render();
}

function deleteLead(id) {
  leads = leads.filter(l => l.id !== id);
  confirmDeleteId = null;
  scheduleSave();
  render();
}

function loadStarter() {
  if (leads.length > 0 && !confirm('Add the 14 starter contacts to your current list?')) return;
  const now = nowISO();
  const starter = STARTER_LIST.map((l, i) => ({
    id: `starter-${Date.now()}-${i}`,
    ...l,
    createdAt: now,
    lastUpdated: now,
  }));
  leads = [...starter, ...leads];
  scheduleSave();
  render();
}

function exportData() {
  const blob = new Blob([JSON.stringify(leads, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `jsdesigns-leads-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function escape(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function copyToClipboard(text, btnId) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById(btnId);
      if (btn) {
        btn.textContent = '✓';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '⧉'; btn.classList.remove('copied'); }, 1200);
      }
    });
  }
}

function onSearch(value) {
  searchTerm = value.toLowerCase().trim();
  document.getElementById('search-clear').style.display = searchTerm ? 'block' : 'none';
  render();
}
function clearSearch() {
  searchTerm = '';
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').style.display = 'none';
  render();
}

function leadMatchesSearch(lead) {
  if (!searchTerm) return true;
  return [lead.name, lead.phone, lead.notes, lead.category, lead.source]
    .filter(Boolean)
    .some(s => String(s).toLowerCase().includes(searchTerm));
}

function render() {
  if (!isConfigured()) {
    document.getElementById('setup-warning').innerHTML = `
      <div class="setup-error">
        <h3>setup needed —</h3>
        <p>Open this file in a text editor and paste your JSONbin <code>BIN_ID</code> and <code>ACCESS_KEY</code> near the top of the page. Until then, the tracker works locally only (no cross-device sync).</p>
      </div>
    `;
  } else {
    document.getElementById('setup-warning').innerHTML = '';
  }

  // Follow-up banner
  const staleLeads = leads.filter(isStale);
  const followupEl = document.getElementById('followup-area');
  if (staleLeads.length > 0) {
    followupEl.innerHTML = `
      <div class="followup-banner">
        <div class="followup-banner-text">
          <span class="dot"></span>
          <span><strong>${staleLeads.length}</strong> ${staleLeads.length === 1 ? 'lead needs' : 'leads need'} follow-up (${FOLLOWUP_THRESHOLD_DAYS}+ days quiet)</span>
        </div>
        <button class="${showOnlyStale ? 'active' : ''}" onclick="toggleStaleFilter()">${showOnlyStale ? 'show all' : 'show them'}</button>
      </div>
    `;
  } else {
    followupEl.innerHTML = '';
    if (showOnlyStale) showOnlyStale = false;
  }

  // Stats
  const statsEl = document.getElementById('stats');
  const counts = {};
  STATUSES.forEach(s => { counts[s.id] = leads.filter(l => l.status === s.id).length; });
  statsEl.innerHTML = STATUSES.map(s => `
    <button class="stat" onclick="scrollToSection('${s.id}')">
      <div class="stat-num">${counts[s.id] || 0}</div>
      <div class="stat-label"><span class="dot" style="background:${s.dot}"></span>${s.short}</div>
    </button>
  `).join('');

  // Add form
  const addEl = document.getElementById('add-area');
  if (showAddForm) {
    addEl.innerHTML = `
      <div class="add-form">
        <div class="add-form-title">new contact —</div>
        <input class="input" id="new-name" type="text" placeholder="business name (required)" value="${escape(newLeadDraft.name)}" autofocus>
        <input class="input" id="new-phone" type="text" placeholder="phone or email (optional)" value="${escape(newLeadDraft.phone)}">
        <select class="select" id="new-category">
          ${CATEGORIES.map(c => `<option value="${escape(c)}" ${newLeadDraft.category === c ? 'selected' : ''}>${escape(c)}</option>`).join('')}
        </select>
        <select class="select" id="new-source">
          ${SOURCES.map(s => `<option value="${escape(s)}" ${newLeadDraft.source === s ? 'selected' : ''}>${escape(s)}</option>`).join('')}
        </select>
        <select class="select" id="new-status">
          ${STATUSES.map(s => `<option value="${s.id}" ${newLeadDraft.status === s.id ? 'selected' : ''}>${s.label} — ${s.desc}</option>`).join('')}
        </select>
        <textarea class="textarea" id="new-notes" placeholder="notes (optional)" rows="2">${escape(newLeadDraft.notes)}</textarea>
        <div class="form-actions">
          <button class="save-btn" onclick="saveNew()">save</button>
          <button class="cancel-btn" onclick="cancelNew()">cancel</button>
        </div>
      </div>
    `;
  } else {
    addEl.innerHTML = `
      <div class="add-row">
        <button class="btn-primary" onclick="openAdd()">+ Add contact</button>
        ${leads.length === 0 ? `<button class="btn-secondary" onclick="loadStarter()">load starter list</button>` : ''}
      </div>
    `;
  }

  const starterBtn = document.getElementById('load-starter-btn');
  if (starterBtn) starterBtn.style.display = leads.length > 0 ? 'inline' : 'none';

  // Filter leads (search + stale)
  let visibleLeads = leads.filter(leadMatchesSearch);
  if (showOnlyStale) visibleLeads = visibleLeads.filter(isStale);

  const container = document.getElementById('sections-container');
  if (leads.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <p class="empty-title">no contacts yet —</p>
        <p class="empty-hint">add your first one or load the starter list</p>
      </div>
    `;
    return;
  }
  if (visibleLeads.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <p class="empty-title">${searchTerm ? 'no matches —' : 'all caught up —'}</p>
        <p class="empty-hint">${searchTerm ? 'try a different search' : 'no leads need follow-up right now'}</p>
      </div>
    `;
    return;
  }

  container.innerHTML = STATUSES.map(status => {
    const sectionLeads = visibleLeads.filter(l => l.status === status.id)
      .sort((a, b) => new Date(b.lastUpdated || b.createdAt) - new Date(a.lastUpdated || a.createdAt));
    if (sectionLeads.length === 0 && (searchTerm || showOnlyStale)) return '';
    if (sectionLeads.length === 0 && status.id !== 'verified') return '';
    return `
      <section class="section" id="section-${status.id}">
        <div class="section-header">
          <h2 class="section-title">
            <span class="dot" style="background:${status.dot}"></span>
            ${status.label}
            <span class="section-count">— ${sectionLeads.length}</span>
          </h2>
          <span class="section-desc">${status.desc}</span>
        </div>
        ${sectionLeads.length === 0
          ? `<div class="section-empty">nothing here yet —</div>`
          : sectionLeads.map(lead => renderLead(lead, status)).join('')
        }
      </section>
    `;
  }).join('');
}

function renderLead(lead, status) {
  const isEditing = editingId === lead.id;
  const isConfirm = confirmDeleteId === lead.id;
  const stale = isStale(lead);
  const phoneHref = lead.phone
    ? (lead.phone.includes('@') ? `mailto:${lead.phone}` : `sms:${lead.phone.replace(/[^0-9+]/g, '')}`)
    : null;
  const extraClass = [
    status.id === 'talking' ? 'lead-talking' : '',
    status.id === 'working' ? 'lead-working' : '',
    stale ? 'lead-stale' : '',
  ].filter(Boolean).join(' ');
  const days = daysSince(lead.lastUpdated || lead.createdAt);
  const copyBtnId = `copy-${lead.id}`;

  return `
    <div class="lead ${extraClass}">
      <div class="lead-info">
        <div class="lead-name-row">
          <div class="lead-name">${escape(lead.name)}</div>
          ${stale ? `<span class="stale-badge">● follow up</span>` : ''}
        </div>
        ${lead.phone ? `
          <a class="lead-phone" href="${phoneHref}">${escape(lead.phone)}</a>
          <button id="${copyBtnId}" class="copy-btn" onclick="copyToClipboard('${escape(lead.phone)}', '${copyBtnId}')" title="copy">⧉</button>
        ` : ''}
        <div class="lead-tags">
          ${lead.category ? `<span class="lead-tag">${escape(lead.category)}</span>` : ''}
          ${lead.source ? `<span class="lead-tag">${escape(lead.source)}</span>` : ''}
          <span class="lead-time ${stale ? 'stale' : ''}">${days !== null ? `updated ${relativeTime(lead.lastUpdated || lead.createdAt)}` : ''}</span>
        </div>
      </div>
      ${lead.notes ? `<div class="lead-notes"><span class="lead-notes-prefix">— </span>${escape(lead.notes)}</div>` : ''}
      <div class="lead-actions">
        <select class="select" onchange="updateLead('${lead.id}', { status: this.value })">
          ${STATUSES.map(s => `<option value="${s.id}" ${s.id === lead.status ? 'selected' : ''}>${s.label}</option>`).join('')}
        </select>
        ${stale ? `<button class="touch-btn" onclick="touchLead('${lead.id}')" title="mark as touched without changing status">touched</button>` : ''}
        <button class="lead-btn ${isEditing ? 'active' : ''}" onclick="toggleEdit('${lead.id}')">${isEditing ? 'done' : 'edit'}</button>
        ${isConfirm
          ? `<button class="lead-btn danger" onclick="deleteLead('${lead.id}')">sure?</button>
             <button class="lead-btn" onclick="cancelDelete()">×</button>`
          : `<button class="lead-btn" onclick="askDelete('${lead.id}')">del</button>`
        }
      </div>
      ${isEditing ? `
        <div class="edit-panel">
          <input class="input" type="text" value="${escape(lead.name)}" placeholder="name"
            oninput="updateLead('${lead.id}', { name: this.value })">
          <input class="input" type="text" value="${escape(lead.phone || '')}" placeholder="phone or email"
            oninput="updateLead('${lead.id}', { phone: this.value })">
          <select class="select" onchange="updateLead('${lead.id}', { category: this.value })">
            ${CATEGORIES.map(c => `<option value="${c === CATEGORIES[0] ? '' : escape(c)}" ${(!lead.category && c === CATEGORIES[0]) || lead.category === c ? 'selected' : ''}>${escape(c)}</option>`).join('')}
          </select>
          <select class="select" onchange="updateLead('${lead.id}', { source: this.value })">
            ${SOURCES.map(s => `<option value="${s === SOURCES[0] ? '' : escape(s)}" ${(!lead.source && s === SOURCES[0]) || lead.source === s ? 'selected' : ''}>${escape(s)}</option>`).join('')}
          </select>
          <textarea class="textarea" rows="2" placeholder="notes"
            oninput="updateLead('${lead.id}', { notes: this.value })">${escape(lead.notes || '')}</textarea>
        </div>
      ` : ''}
    </div>
  `;
}

function openAdd() {
  showAddForm = true;
  render();
  setTimeout(() => document.getElementById('new-name')?.focus(), 50);
}
function cancelNew() {
  showAddForm = false;
  newLeadDraft = { name: '', phone: '', category: CATEGORIES[0], source: SOURCES[0], status: 'verified', notes: '' };
  render();
}
function saveNew() {
  newLeadDraft = {
    name: document.getElementById('new-name').value,
    phone: document.getElementById('new-phone').value,
    category: document.getElementById('new-category').value,
    source: document.getElementById('new-source').value,
    status: document.getElementById('new-status').value,
    notes: document.getElementById('new-notes').value,
  };
  addLead();
}
function toggleEdit(id) { editingId = editingId === id ? null : id; confirmDeleteId = null; render(); }
function askDelete(id) { confirmDeleteId = id; render(); }
function cancelDelete() { confirmDeleteId = null; render(); }
function scrollToSection(statusId) {
  const el = document.getElementById('section-' + statusId);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function toggleStaleFilter() {
  showOnlyStale = !showOnlyStale;
  render();
}

async function init() {
  leads = loadFromLocal();
  render();
  if (!isConfigured()) {
    setSyncStatus('error', 'setup needed — local only');
    return;
  }
  const cloud = await loadFromCloud();
  if (cloud !== null) {
    leads = cloud;
    saveToLocal();
    render();
  }
}

init();
</script>
</body>
</html>
